<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>מערכת לייזר: הגנה אווירית</title>
    <style>
        body {
            background-color: #050510; color: #00ffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center; margin: 0; padding: 0;
            overflow: hidden; display: flex; flex-direction: column;
            height: 100vh; touch-action: none;
        }
        #ui-container { padding: 10px; user-select: none; flex-shrink: 0; }
        #game-wrapper {
            flex-grow: 1; position: relative; width: 100%;
            display: flex; justify-content: center; align-items: center;
        }
        canvas { background-color: #0a0f24; display: block; }
        @media (min-width: 850px) {
            canvas { border: 2px solid #1a365d; border-radius: 10px; box-shadow: 0 0 20px rgba(0, 255, 255, 0.2); }
        }
        #alert-container { position: absolute; right: 20px; top: 15%; width: 220px; pointer-events: none; z-index: 10; }
        .alert-msg {
            background: rgba(255, 0, 0, 0.7); border-right: 4px solid #fff;
            padding: 10px; color: white; font-weight: bold;
            margin-bottom: 8px; font-size: 13px; animation: fadeOut 3s forwards;
            box-shadow: 0 0 10px rgba(255,0,0,0.5); border-radius: 4px;
        }
        .alert-emp {
            background: rgba(0, 255, 255, 0.7); border-right: 4px solid #fff;
            color: #000;
        }
        @keyframes fadeOut { 0% { opacity: 1; transform: translateX(0); } 80% { opacity: 1; } 100% { opacity: 0; transform: translateX(30px); } }
        #restart-btn {
            display: none; position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%);
            padding: 15px 30px; font-size: 22px; background: #00ffff; color: #050510;
            border: none; border-radius: 5px; cursor: pointer; font-weight: bold; z-index: 20;
        }
        #powerup-bar {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 220px; height: 12px; background: rgba(0,0,0,0.5); border: 2px solid #0f0;
            display: none; border-radius: 10px; overflow: hidden; box-shadow: 0 0 10px #0f0;
        }
        #powerup-progress { height: 100%; background: linear-gradient(90deg, #0f0, #5f5); width: 100%; }
    </style>
</head>
<body>

    <div id="ui-container">
        <h1 style="margin:0; font-size: 20px;">מערכת לייזר: הגנה אווירית</h1>
        <div style="font-size: 14px; color: #88ccff;">שיא: <span id="high-score-val">0</span> | רצף לשדרוג: <span id="combo-val">0</span>/10</div>
    </div>

    <div id="game-wrapper">
        <div id="alert-container"></div>
        <div id="powerup-bar"><div id="powerup-progress"></div></div>
        <canvas id="gameCanvas"></canvas>
        <button id="restart-btn" onclick="resetGame()">שחק שוב</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const restartBtn = document.getElementById('restart-btn');
        const alertContainer = document.getElementById('alert-container');
        const pBar = document.getElementById('powerup-bar');
        const pProgress = document.getElementById('powerup-progress');

        let score, shields, drones, particles, shakeTime, gameOver, currentCombo;
        let superLaserTimer = 0, empFlash = 0, gameSpeedFactor = 1.0;
        let lastEmpScore = 0;
        const SUPER_LASER_MAX = 180; 
        let highScore = localStorage.getItem('droneHighScore') || 0;
        document.getElementById('high-score-val').innerText = highScore;

        const cities = ["תל אביב", "חיפה", "אשקלון", "באר שבע", "נהריה", "שדרות", "ירושלים", "אשדוד", "קרית שמונה", "נתיבות"];

        function resize() {
            const wrapper = document.getElementById('game-wrapper');
            canvas.width = (window.innerWidth < 850) ? window.innerWidth : 800;
            canvas.height = (window.innerWidth < 850) ? wrapper.clientHeight : 600;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                this.size = Math.random() * 3 + 1;
                this.speedX = (Math.random() - 0.5) * 10;
                this.speedY = (Math.random() - 0.5) * 10;
                this.life = 1.0;
            }
            update() { this.x += this.speedX; this.y += this.speedY; this.life -= 0.04; }
            draw() {
                ctx.globalAlpha = this.life; ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, this.size, this.size);
                ctx.globalAlpha = 1;
            }
        }

        class Drone {
            constructor() {
                this.type = this.getType();
                this.x = Math.random() * (canvas.width - 80) + 40;
                this.y = -40; this.lockLevel = 0;
                this.setupStats();
            }
            getType() {
                let r = Math.random();
                if (r < 0.15) return 'fast';
                if (r < 0.35) return 'tank';
                return 'normal';
            }
            setupStats() {
                if (this.type === 'tank') {
                    this.baseSpeed = 0.7;
                    this.color = '#ffcc00'; this.size = 20;
                } else if (this.type === 'fast') {
                    this.baseSpeed = 2.5;
                    this.color = '#cc00ff'; this.size = 11;
                } else {
                    this.baseSpeed = 1.1;
                    this.color = '#ff4444'; this.size = 15;
                }
            }
            update() {
                this.y += this.baseSpeed * gameSpeedFactor;
                if (this.type === 'fast') this.x += Math.sin(this.y / 20) * 5;
                
                let dist = Math.sqrt((this.x - mouseX)**2 + (this.y - mouseY)**2);
                let hitRadius = (window.innerWidth < 850) ? 75 : 55;
                let lockSpeed = (superLaserTimer > 0) ? 30 : 12;
                if (this.type === 'tank' && superLaserTimer === 0) lockSpeed = 6;
                if (dist < hitRadius) this.lockLevel += lockSpeed;
                else this.lockLevel = Math.max(0, this.lockLevel - 6);
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x - this.size, this.y - 4, this.size * 2, 8);
                ctx.fillStyle = "#fff";
                [[-1,-1], [1,-1], [-1,1], [1,1]].forEach(p => {
                    ctx.beginPath(); ctx.arc(this.x + p[0]*this.size*1.1, this.y + p[1]*6, 3, 0, Math.PI*2); ctx.fill();
                });
                if (this.lockLevel > 0) {
                    ctx.fillStyle = "#333"; ctx.fillRect(this.x-20, this.y-25, 40, 5);
                    ctx.fillStyle = superLaserTimer > 0 ? "#0f0" : "#0ff";
                    ctx.fillRect(this.x-20, this.y-25, (this.lockLevel/100)*40, 5);
                }
            }
        }

        function showAlert(type = 'hit') {
            const div = document.createElement('div');
            div.className = 'alert-msg';
            if (type === 'hit') {
                const city = cities[Math.floor(Math.random() * cities.length)];
                const injured = Math.floor(Math.random() * 5) + 1;
                const killed = Math.floor(Math.random() * 5) + 1;
                div.innerHTML = `נפילה ב${city}<br>⚠️ פצועים: ${injured} | הרוגים: ${killed}`;
            } else if (type === 'emp') {
                div.className += ' alert-emp';
                div.innerHTML = `🛡️ כיפת ברזל עזרה לך<br>והורידה את הכטב"מים!`;
            }
            alertContainer.prepend(div);
            setTimeout(() => { if(div.parentNode) div.remove(); }, 3000);
        }

        function triggerEMP() {
            empFlash = 10;
            shakeTime = 30;
            showAlert('emp');
            drones.forEach(d => {
                for(let j=0; j<15; j++) particles.push(new Particle(d.x, d.y, d.color));
            });
            drones = [];
        }

        function initVars() {
            score = 0; shields = 5; drones = []; particles = [];
            shakeTime = 0; gameOver = false; currentCombo = 0;
            superLaserTimer = 0; empFlash = 0; lastEmpScore = 0;
            gameSpeedFactor = 1.0;
            restartBtn.style.display = 'none'; pBar.style.display = 'none';
            alertContainer.innerHTML = ''; updateComboUI();
        }

        function updateComboUI() { document.getElementById('combo-val').innerText = currentCombo; }

        let mouseX = 0, mouseY = 0;
        function updatePos(x, y) {
            const rect = canvas.getBoundingClientRect();
            mouseX = x - rect.left; mouseY = y - rect.top;
        }
        canvas.addEventListener('mousemove', e => updatePos(e.clientX, e.clientY));
        canvas.addEventListener('touchstart', e => { e.preventDefault(); updatePos(e.touches[0].clientX, e.touches[0].clientY); }, {passive:false});
        canvas.addEventListener('touchmove', e => { e.preventDefault(); updatePos(e.touches[0].clientX, e.touches[0].clientY); }, {passive:false});

        function resetGame() { initVars(); gameLoop(); }

        function gameLoop() {
            if (gameOver) return;
            ctx.save();
            if (shakeTime > 0) { ctx.translate(Math.random()*10-5, Math.random()*10-5); shakeTime--; }
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (shields <= 0) {
                gameOver = true;
                ctx.fillStyle = 'red'; ctx.font = 'bold 50px Arial'; ctx.textAlign = 'center';
                ctx.fillText("הבסיס קרס", canvas.width/2, canvas.height/2);
                ctx.font = 'bold 20px Arial'; ctx.fillStyle = 'white';
                ctx.fillText(`ניקוד סופי: ${score}`, canvas.width/2, canvas.height/2 + 80);
                restartBtn.style.display = 'block';
                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('droneHighScore', score);
                    document.getElementById('high-score-val').innerText = score;
                }
                ctx.restore(); return;
            }

            // מנגנון האצה הדרגתי
            gameSpeedFactor = 1.0 + (score / 10000);

            if (score >= lastEmpScore + 5000) {
                lastEmpScore = score - (score % 5000);
                triggerEMP();
            }

            if (superLaserTimer > 0) {
                superLaserTimer--; pBar.style.display = 'block';
                pProgress.style.width = (superLaserTimer / SUPER_LASER_MAX) * 100 + "%";
            } else { pBar.style.display = 'none'; }

            if (drones.length < 15 && Math.random() < 0.045) drones.push(new Drone());

            let firing = false;
            for (let i = drones.length - 1; i >= 0; i--) {
                drones[i].update(); drones[i].draw();
                if (drones[i].lockLevel > 0) firing = true;
                if (drones[i].lockLevel >= 100) {
                    for(let j=0; j<15; j++) particles.push(new Particle(drones[i].x, drones[i].y, drones[i].color));
                    score += 100;
                    if (superLaserTimer <= 0) {
                        currentCombo++;
                        if (currentCombo >= 10) { superLaserTimer = SUPER_LASER_MAX; currentCombo = 0; }
                    }
                    drones.splice(i, 1); updateComboUI();
                } else if (drones[i].y > canvas.height) {
                    drones.splice(i, 1); shields--; shakeTime = 20;
                    currentCombo = 0; updateComboUI(); showAlert('hit');
                }
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update(); particles[i].draw();
                if (particles[i].life <= 0) particles.splice(i, 1);
            }

            ctx.beginPath(); ctx.moveTo(canvas.width/2, canvas.height); ctx.lineTo(mouseX, mouseY);
            if (superLaserTimer > 0) {
                ctx.strokeStyle = firing ? '#0f0' : 'rgba(0,255,0,0.1)';
                ctx.lineWidth = firing ? 12 : 3;
            } else {
                ctx.strokeStyle = firing ? '#f00' : 'rgba(0,255,255,0.05)';
                ctx.lineWidth = firing ? 6 : 1;
            }
            ctx.stroke();

            if (empFlash > 0) {
                ctx.fillStyle = `rgba(255, 255, 255, ${empFlash/10})`;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                empFlash--;
            }

            ctx.fillStyle = "#0ff"; ctx.font = "18px Courier New"; ctx.textAlign = "right";
            ctx.fillText(`ניקוד: ${score}`, canvas.width - 20, 30);
            for(let i=0; i<5; i++) {
                ctx.fillStyle = i < shields ? "#0f0" : "#222";
                ctx.fillRect(canvas.width - 30 - (i*20), 45, 12, 15);
            }

            ctx.restore(); requestAnimationFrame(gameLoop);
        }

        initVars(); gameLoop();
    </script>
</body>
</html>
