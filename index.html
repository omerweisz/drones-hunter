<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>שאגת הארי : הגנה אווירית</title>
    <style>
        body {
            background-color: #050510; color: #00ffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center; margin: 0; padding: 0;
            overflow: hidden; display: flex; flex-direction: column;
            height: 100vh; touch-action: none;
        }
        #ui-container { padding: 10px; user-select: none; flex-shrink: 0; z-index: 5; }
        #game-wrapper {
            flex-grow: 1; position: relative; width: 100%;
            display: flex; justify-content: center; align-items: center;
        }
        canvas { background-color: #0a0f24; display: block; }
        #alert-container { position: absolute; right: 20px; top: 15%; width: 220px; pointer-events: none; z-index: 100; }
        .alert-msg {
            background: rgba(255, 0, 0, 0.9); border-right: 5px solid #fff;
            padding: 12px; color: white; font-weight: bold; margin-bottom: 10px; 
            font-size: 14px; animation: slideIn 0.3s ease-out, fadeOut 3s forwards;
            box-shadow: 0 0 15px rgba(255,0,0,0.6); border-radius: 4px; text-align: right;
        }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        @keyframes fadeOut { 0% { opacity: 1; } 80% { opacity: 1; } 100% { opacity: 0; transform: translateX(20px); } }
        #restart-btn {
            display: none; position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%);
            padding: 15px 30px; font-size: 22px; background: #ffffff; color: #050510;
            border: 3px solid #0000ff; border-radius: 5px; cursor: pointer; font-weight: bold; z-index: 200;
        }
    </style>
</head>
<body>

    <div id="ui-container">
        <h1 style="margin:0; font-size: 20px;">מערכת לייזר: הגנה אווירית</h1>
        <div style="font-size: 14px;">שיא: <span id="high-score-val">0</span> | חיים: <span id="shields-val">5</span></div>
    </div>

    <div id="game-wrapper">
        <div id="alert-container"></div>
        <canvas id="gameCanvas"></canvas>
        <button id="restart-btn" onclick="resetGame()">שחק שוב</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const restartBtn = document.getElementById('restart-btn');
        const alertContainer = document.getElementById('alert-container');

        let score, shields, drones, particles, shakeTime, gameOver;
        let gameSpeedFactor = 1.0;
        let highScore = localStorage.getItem('droneHighScore') || 0;
        document.getElementById('high-score-val').innerText = highScore;

        function resize() {
            const wrapper = document.getElementById('game-wrapper');
            canvas.width = (window.innerWidth < 850) ? window.innerWidth : 800;
            canvas.height = (window.innerWidth < 850) ? wrapper.clientHeight : 600;
        }
        window.addEventListener('resize', resize);
        resize();

        function drawStar(x, y, size, color, thickness = 2) {
            ctx.save();
            ctx.translate(x, y);
            ctx.strokeStyle = color;
            ctx.lineWidth = thickness;
            
            // משולש 1
            ctx.beginPath();
            ctx.moveTo(0, -size);
            ctx.lineTo(size * 0.86, size * 0.5);
            ctx.lineTo(-size * 0.86, size * 0.5);
            ctx.closePath();
            ctx.stroke();
            
            // משולש 2
            ctx.beginPath();
            ctx.moveTo(0, size);
            ctx.lineTo(size * 0.86, -size * 0.5);
            ctx.lineTo(-size * 0.86, -size * 0.5);
            ctx.closePath();
            ctx.stroke();
            
            ctx.restore();
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                this.size = Math.random() * 10 + 5;
                this.speedX = (Math.random() - 0.5) * 12;
                this.speedY = (Math.random() - 0.5) * 12;
                this.life = 1.0;
                this.angle = Math.random() * Math.PI;
            }
            update() { 
                this.x += this.speedX; this.y += this.speedY; 
                this.life -= 0.02;
                this.angle += 0.1;
            }
            draw() {
                ctx.globalAlpha = this.life;
                drawStar(this.x, this.y, this.size, this.color, 1.5);
                ctx.globalAlpha = 1;
            }
        }

        class Drone {
            constructor() {
                let r = Math.random();
                if (r < 0.15) { 
                    this.colors = ['#008000', '#ffffff', '#ff0000']; this.size = 14; this.speed = 2.5;
                } else if (r < 0.35) { 
                    this.colors = ['#ffffff', '#ff0000', '#000000']; this.size = 24; this.speed = 0.8;
                } else { 
                    this.colors = ['#ffffff', '#ff0000', '#008000']; this.size = 18; this.speed = 1.2;
                }
                this.x = Math.random() * (canvas.width - 60) + 30;
                this.y = -40; this.lockLevel = 0;
            }
            update() {
                this.y += this.speed * gameSpeedFactor;
                let dist = Math.sqrt((this.x - mouseX)**2 + (this.y - mouseY)**2);
                if (dist < 60) this.lockLevel += 15;
                else this.lockLevel = Math.max(0, this.lockLevel - 5);
            }
            draw() {
                let w = this.size * 2;
                this.colors.forEach((color, i) => {
                    ctx.fillStyle = color;
                    ctx.fillRect(this.x - this.size + (i * (w/3)), this.y - 6, w/3, 12);
                });
                if (this.lockLevel > 0) {
                    ctx.fillStyle = "#333"; ctx.fillRect(this.x-15, this.y-20, 30, 4);
                    ctx.fillStyle = "#0ff"; ctx.fillRect(this.x-15, this.y-20, (this.lockLevel/100)*30, 4);
                }
            }
        }

        function triggerAlert() {
            const div = document.createElement('div');
            div.className = 'alert-msg';
            div.innerHTML = `נפילה באזור המגורים!<br>⚠️ יש פצועים בשטח`;
            alertContainer.prepend(div);
            setTimeout(() => { if(div.parentNode) div.remove(); }, 3000);
        }

        function initVars() {
            score = 0; shields = 5; drones = []; particles = [];
            shakeTime = 0; gameOver = false;
            restartBtn.style.display = 'none';
            document.getElementById('shields-val').innerText = shields;
        }

        let mouseX = 0, mouseY = 0;
        function updatePos(x, y) {
            const rect = canvas.getBoundingClientRect();
            mouseX = x - rect.left; mouseY = y - rect.top;
        }
        canvas.addEventListener('mousemove', e => updatePos(e.clientX, e.clientY));
        canvas.addEventListener('touchmove', e => { e.preventDefault(); updatePos(e.touches[0].clientX, e.touches[0].clientY); }, {passive:false});

        function resetGame() { initVars(); gameLoop(); }

        function gameLoop() {
            if (gameOver) return;
            ctx.save();
            if (shakeTime > 0) { ctx.translate(Math.random()*10-5, Math.random()*10-5); shakeTime--; }
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (shields <= 0) {
                gameOver = true;
                ctx.fillStyle = 'red'; ctx.font = 'bold 40px Arial'; ctx.textAlign = 'center';
                ctx.fillText("המשחק נגמר", canvas.width/2, canvas.height/2);
                restartBtn.style.display = 'block';
                ctx.restore(); return;
            }

            if (drones.length < 8 && Math.random() < 0.05) drones.push(new Drone());

            let firing = false;
            for (let i = drones.length - 1; i >= 0; i--) {
                drones[i].update(); drones[i].draw();
                if (drones[i].lockLevel > 0) firing = true;
                
                if (drones[i].lockLevel >= 100) {
                    for(let j=0; j<8; j++) particles.push(new Particle(drones[i].x, drones[i].y, "#ffffff"));
                    score += 100; drones.splice(i, 1);
                } else if (drones[i].y > canvas.height) {
                    drones.splice(i, 1); shields--; shakeTime = 20; triggerAlert();
                    document.getElementById('shields-val').innerText = shields;
                }
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update(); particles[i].draw();
                if (particles[i].life <= 0) particles.splice(i, 1);
            }

            if (firing) {
                let grad = ctx.createLinearGradient(canvas.width/2, canvas.height, mouseX, mouseY);
                grad.addColorStop(0, "blue"); grad.addColorStop(1, "white");
                ctx.strokeStyle = grad; ctx.lineWidth = 4;
                ctx.beginPath(); ctx.moveTo(canvas.width/2, canvas.height); ctx.lineTo(mouseX, mouseY); ctx.stroke();
                drawStar(mouseX, mouseY, 12, "#ffffff", 2); // מגן דוד בקצה הלייזר
            }

            ctx.fillStyle = "#0ff"; ctx.font = "bold 16px Arial"; ctx.textAlign = "right";
            ctx.fillText(`ניקוד: ${score}`, canvas.width - 20, 30);
            
            ctx.restore(); requestAnimationFrame(gameLoop);
        }

        initVars(); gameLoop();
    </script>
</body>
</html>
