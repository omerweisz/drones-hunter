<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>שאגת הארי - גרסת המערכות</title>
    <style>
        body { background-color: #050510; color: #00ffff; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; touch-action: none; }
        #ui-container { padding: 10px; background: rgba(0,0,30,0.9); z-index: 10; border-bottom: 2px solid #00f; }
        #game-wrapper { flex-grow: 1; position: relative; width: 100%; overflow: hidden; }
        canvas { background-color: #0a0f24; display: block; }
        #system-msg { position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%); width: 80%; font-size: 32px; color: #fff; font-weight: bold; text-shadow: 0 0 20px #f00; display: none; pointer-events: none; z-index: 100; text-align: center; background: rgba(0,0,0,0.7); padding: 20px; border-radius: 15px; border: 2px solid #00f; }
        #power-status { position: absolute; bottom: 20px; left: 20px; font-size: 18px; color: #ff0; font-weight: bold; }
        #restart-btn { display: none; position: absolute; top: 55%; left: 50%; transform: translate(-50%, -50%); padding: 15px 40px; font-size: 24px; background: #fff; color: #000; border: 4px solid #00f; border-radius: 10px; cursor: pointer; z-index: 200; }
    </style>
</head>
<body>

    <div id="ui-container">
        <h1 style="margin:0; font-size: 24px;">שאגת הארי</h1>
        <div style="font-size: 16px;">
            ניקוד: <span id="score-val">0</span> | 
            רצף ללייזר חזק: <span id="combo-val">0</span>/10 | 
            הגנות: <span id="shields-val">5</span>
        </div>
    </div>

    <div id="game-wrapper">
        <div id="system-msg">כיפת ברזל ומערכת חץ עזרו לך, כל הכטב"מים יורטו</div>
        <div id="power-status">סטטוס לייזר: רגיל</div>
        <canvas id="gameCanvas"></canvas>
        <button id="restart-btn" onclick="resetGame()">שחק שוב</button>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const systemMsg = document.getElementById('system-msg');
    const powerStatus = document.getElementById('power-status');

    let score, shields, drones, particles, gameOver, combo, lastBonusScore;
    let laserPower = 1; // 1 = רגיל, 5 = חזק
    let isLaserCharged = false;
    let isCooldown = false;
    let mx = -100, my = -100, flash = 0;

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight - document.getElementById('ui-container').offsetHeight;
    }
    window.addEventListener('resize', resize); resize();

    class Drone {
        constructor() {
            let r = Math.random();
            if (r < 0.3) { this.type='fast'; this.speed=4.5; this.hpMax=100; } // סגול
            else if (r < 0.5) { this.type='tank'; this.speed=1.4; this.hpMax=250; } // צהוב
            else { this.type='norm'; this.speed=2.6; this.hpMax=150; } // אדום
            this.x = Math.random()*(canvas.width-80)+40; this.y = -60; this.hp = 0;
        }
        update() {
            this.y += this.speed;
            let d = Math.sqrt((this.x-mx)**2 + (this.y-my)**2);
            if (d < 50) this.hp += (5 * laserPower); 
        }
        draw() {
            ctx.strokeStyle = "#777"; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(this.x-20, this.y-12); ctx.lineTo(this.x+20, this.y+12);
            ctx.moveTo(this.x+20, this.y-12); ctx.lineTo(this.x-20, this.y+12); ctx.stroke();

            let w = 34, h = 16;
            let cL, cM, cR;
            if(this.type === 'norm') { cR='#f00'; cM='#007a3d'; cL='#fff'; } 
            else if(this.type === 'fast') { cL='#f00'; cM='#007a3d'; cR='#fff'; } 
            else { cL='#f00'; cM='#000'; cR='#fff'; } 

            ctx.fillStyle = cL; ctx.fillRect(this.x-w/2, this.y-h/2, w/3, h);
            ctx.fillStyle = cM; ctx.fillRect(this.x-w/2+w/3, this.y-h/2, w/3, h);
            ctx.fillStyle = cR; ctx.fillRect(this.x-w/2+(w/3)*2, this.y-h/2, w/3, h);
            
            ctx.fillStyle="#fff"; [[-20,-12],[20,-12],[-20,12],[20,12]].forEach(p=> { ctx.beginPath(); ctx.arc(this.x+p[0],this.y+p[1],4,0,Math.PI*2); ctx.fill(); });
            if(this.hp>0) { ctx.fillStyle="#0ff"; ctx.fillRect(this.x-17, this.y-22, (this.hp/this.hpMax)*34, 4); }
        }
    }

    function initVars() {
        score=0; shields=5; drones=[]; combo=0; lastBonusScore=0; gameOver=false;
        laserPower = 1; isLaserCharged = false; isCooldown = false;
        document.getElementById('shields-val').innerText = shields;
        document.getElementById('combo-val').innerText = combo;
        document.getElementById('score-val').innerText = score;
        document.getElementById('restart-btn').style.display='none';
        powerStatus.innerText = "סטטוס לייזר: רגיל"; powerStatus.style.color = "#ff0";
    }

    function activateStrongLaser() {
        if(isCooldown || isLaserCharged) return;
        isLaserCharged = true; laserPower = 15; // חזק מאוד
        powerStatus.innerText = "סטטוס לייזר: עוצמתי!!!"; powerStatus.style.color = "#0f0";
        setTimeout(() => {
            laserPower = 1; isLaserCharged = false; isCooldown = true;
            powerStatus.innerText = "סטטוס לייזר: טעינה (Cooldown)..."; powerStatus.style.color = "#f00";
            setTimeout(() => {
                isCooldown = false;
                powerStatus.innerText = "סטטוס לייזר: רגיל"; powerStatus.style.color = "#ff0";
            }, 3000);
        }, 3000);
    }

    function updateMouse(e) {
        let rect = canvas.getBoundingClientRect();
        mx = (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left;
        my = (e.clientY || (e.touches && e.touches[0].clientY)) - rect.top;
    }
    canvas.addEventListener('mousemove', updateMouse);
    canvas.addEventListener('touchstart', updateMouse);
    canvas.addEventListener('touchmove', e => { e.preventDefault(); updateMouse(e); }, {passive: false});

    function resetGame() { initVars(); loop(); }

    function loop() {
        if (gameOver) return;
        ctx.clearRect(0,0,canvas.width,canvas.height);

        if (shields <= 0) {
            gameOver=true; ctx.fillStyle='#f00'; ctx.font='bold 45px Arial'; ctx.textAlign='center';
            ctx.fillText("ההגנה נפרצה!", canvas.width/2, canvas.height/2);
            document.getElementById('restart-btn').style.display='block'; return;
        }

        if(Math.random() < 0.05) drones.push(new Drone());

        // מערכת חץ וכיפה כל 5,000
        if(score >= lastBonusScore + 5000 && score > 0) {
            lastBonusScore += 5000;
            systemMsg.style.display = 'block';
            drones.forEach(d => { d.hp = d.hpMax; }); // השמדת כולם
            setTimeout(() => { systemMsg.style.display = 'none'; }, 3000);
        }

        let firing = false;
        for(let i=drones.length-1; i>=0; i--) {
            drones[i].update(); drones[i].draw();
            if(drones[i].hp > 0) firing = true;

            if(drones[i].hp >= drones[i].hpMax) {
                score += 100; drones.splice(i,1);
                if(!isLaserCharged && !isCooldown) {
                    combo++;
                    if(combo >= 10) { combo = 0; activateStrongLaser(); }
                }
                document.getElementById('combo-val').innerText = combo;
                document.getElementById('score-val').innerText = score;
            } else if(drones[i].y > canvas.height) {
                drones.splice(i,1); shields--; combo=0;
                document.getElementById('shields-val').innerText = shields;
                document.getElementById('combo-val').innerText = combo;
            }
        }

        if(firing) {
            let g = ctx.createLinearGradient(canvas.width/2, canvas.height, mx, my);
            if(isLaserCharged) { g.addColorStop(0, "#ff0"); g.addColorStop(1, "#fff"); }
            else { g.addColorStop(0, "#00f"); g.addColorStop(1, "#fff"); }
            ctx.strokeStyle = g; ctx.lineWidth = isLaserCharged ? 10 : 6;
            ctx.beginPath(); ctx.moveTo(canvas.width/2, canvas.height); ctx.lineTo(mx, my); ctx.stroke();
        }

        requestAnimationFrame(loop);
    }
    initVars(); loop();
</script>
</body>
</html>
