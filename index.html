<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>שאגת הארי : הגנה אווירית</title>
    <style>
        body { background-color: #050510; color: #00ffff; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; touch-action: none; }
        #ui-container { padding: 10px; background: rgba(0,0,30,0.9); z-index: 10; border-bottom: 2px solid #00f; user-select: none; }
        #game-wrapper { flex-grow: 1; position: relative; width: 100%; overflow: hidden; display: flex; justify-content: center; }
        canvas { background-color: #0a0f24; display: block; }
        
        #alert-container { position: absolute; left: 20px; top: 20px; width: 280px; pointer-events: none; z-index: 100; display: flex; flex-direction: column; gap: 10px; }
        .alert-msg { background: rgba(200, 0, 0, 0.9); border-right: 6px solid #ff3333; padding: 15px; color: white; font-weight: bold; font-size: 16px; animation: slideIn 0.3s ease-out, fadeOut 4s forwards; border-radius: 5px; text-align: right; box-shadow: 0 0 15px rgba(255,0,0,0.6); }
        
        #system-msg { position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%); width: 85%; font-size: 26px; color: #fff; font-weight: bold; text-shadow: 0 0 20px #f00; display: none; pointer-events: none; z-index: 110; text-align: center; background: rgba(0,0,0,0.85); padding: 25px; border-radius: 15px; border: 3px solid #00f; line-height: 1.4; }
        
        #laser-ui { width: 100%; height: 25px; background: #111; border-top: 3px solid #333; position: relative; z-index: 50; }
        #laser-bar { height: 100%; width: 0%; background: #0088ff; transition: width 0.1s linear, background-color 0.2s; box-shadow: 0 0 10px #0088ff; }
        
        #restart-btn { display: none; position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%); padding: 18px 45px; font-size: 26px; background: #fff; color: #000; border: 5px solid #00f; border-radius: 12px; cursor: pointer; font-weight: bold; z-index: 200; box-shadow: 0 0 20px #00f; }
        
        @keyframes slideIn { from { transform: translateX(-100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeOut { 0% { opacity: 1; } 80% { opacity: 1; } 100% { opacity: 0; transform: translateY(-20px); } }
    </style>
</head>
<body>

    <div id="ui-container">
        <h1 style="margin:0; font-size: 24px;">שאגת הארי : הגנה אווירית</h1>
        <div style="font-size: 16px;">
            ניקוד: <span id="score-val">0</span> | 
            הגנות: <span id="shields-val">5</span>
        </div>
    </div>

    <div id="game-wrapper">
        <div id="alert-container"></div>
        <div id="system-msg">כיפת ברזל ומערכת חץ עזרו לך,<br>כל הכטב"מים יורטו!</div>
        <canvas id="gameCanvas"></canvas>
        <button id="restart-btn" onclick="resetGame()">שחק שוב</button>
    </div>
    
    <div id="laser-ui">
        <div id="laser-bar"></div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const alertContainer = document.getElementById('alert-container');
    const systemMsg = document.getElementById('system-msg');
    const laserBar = document.getElementById('laser-bar');
    const restartBtn = document.getElementById('restart-btn');

    let score, shields, drones, gameOver, combo, lastBonusScore;
    
    let baseLaserPower = 4.5; // לייזר חזק יותר להריגה מהירה
    let laserPower = baseLaserPower; 
    let isLaserCharged = false, isCooldown = false;
    let laserTimer = 0; 
    const POWER_FRAMES = 180; 
    const COOLDOWN_FRAMES = 180; 

    let mx = -100, my = -100;
    const cities = ["תל אביב", "חיפה", "אשקלון", "באר שבע", "נהריה", "שדרות", "ירושלים", "אשדוד", "קרית שמונה", "נתיבות"];

    function resize() {
        canvas.width = Math.min(window.innerWidth, 800);
        canvas.height = window.innerHeight - document.getElementById('ui-container').offsetHeight - document.getElementById('laser-ui').offsetHeight;
    }
    window.addEventListener('resize', resize); resize();

    class Drone {
        constructor() {
            let r = Math.random();
            // המהירויות סונכרנו כדי למנוע מצבים בלתי אפשריים
            if (r < 0.3) { this.type='fast'; this.speed=3.4; this.hpMax=80; } // סגול - מהיר במידה
            else if (r < 0.5) { this.type='tank'; this.speed=1.8; this.hpMax=280; } // צהוב - איטי ועמיד
            else { this.type='norm'; this.speed=2.7; this.hpMax=130; } // אדום - רגיל
            this.x = Math.random()*(canvas.width-80)+40; this.y = -60; this.hp = 0;
        }
        update() {
            this.y += this.speed;
            let d = Math.sqrt((this.x-mx)**2 + (this.y-my)**2);
            if (d < 45) { this.hp += laserPower; }
        }
        draw() {
            ctx.strokeStyle = "#777"; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(this.x-20, this.y-12); ctx.lineTo(this.x+20, this.y+12); ctx.moveTo(this.x+20, this.y-12); ctx.lineTo(this.x-20, this.y+12); ctx.stroke();
            let w = 34, h = 16, cL, cM, cR;
            if(this.type === 'norm') { cR='#f00'; cM='#007a3d'; cL='#fff'; } 
            else if(this.type === 'fast') { cL='#f00'; cM='#007a3d'; cR='#fff'; } 
            else { cL='#f00'; cM='#000'; cR='#fff'; } 
            ctx.fillStyle = cL; ctx.fillRect(this.x-w/2, this.y-h/2, w/3, h); ctx.fillStyle = cM; ctx.fillRect(this.x-w/2+w/3, this.y-h/2, w/3, h); ctx.fillStyle = cR; ctx.fillRect(this.x-w/2+(w/3)*2, this.y-h/2, w/3, h);
            ctx.fillStyle="#fff"; [[-20,-12],[20,-12],[-20,12],[20,12]].forEach(p=> { ctx.beginPath(); ctx.arc(this.x+p[0],this.y+p[1],4,0,Math.PI*2); ctx.fill(); });
            if(this.hp > 0) { ctx.fillStyle = "rgba(0,255,255,0.8)"; ctx.fillRect(this.x-17, this.y-25, (this.hp/this.hpMax)*34, 4); }
        }
    }

    function triggerImpactAlert() {
        const div = document.createElement('div');
        div.className = 'alert-msg';
        const city = cities[Math.floor(Math.random() * cities.length)];
        const dead = Math.floor(Math.random() * 5) + 1;
        const injured = Math.floor(Math.random() * 5) + 1;
        div.innerHTML = `נפילה ב${city}, הרוגים ${dead} פצועים ${injured}`;
        alertContainer.prepend(div);
        setTimeout(() => { if(div.parentNode) div.remove(); }, 4000);
    }

    function initVars() {
        score=0; shields=5; drones=[]; combo=0; lastBonusScore=0; gameOver=false;
        laserPower = baseLaserPower; isLaserCharged = false; isCooldown = false; laserTimer = 0;
        document.getElementById('shields-val').innerText = shields; document.getElementById('score-val').innerText = score;
        restartBtn.style.display='none';
        alertContainer.innerHTML = ''; 
        updateLaserUI();
    }

    function updateLaserUI() {
        if (isLaserCharged) {
            laserBar.style.width = (laserTimer / POWER_FRAMES * 100) + '%';
            laserBar.style.backgroundColor = '#ffcc00'; 
            laserBar.style.boxShadow = '0 0 15px #ffcc00';
        } else if (isCooldown) {
            laserBar.style.width = (laserTimer / COOLDOWN_FRAMES * 100) + '%';
            laserBar.style.backgroundColor = '#ff0000'; 
            laserBar.style.boxShadow = '0 0 10px #ff0000';
        } else {
            laserBar.style.width = (combo / 10 * 100) + '%';
            laserBar.style.backgroundColor = '#0088ff'; 
            laserBar.style.boxShadow = '0 0 10px #0088ff';
        }
    }

    function updateMouse(e) {
        let rect = canvas.getBoundingClientRect();
        mx = (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left;
        my = (e.clientY || (e.touches && e.touches[0].clientY)) - rect.top;
    }
    canvas.addEventListener('mousemove', updateMouse); canvas.addEventListener('touchstart', updateMouse); canvas.addEventListener('touchmove', e => { e.preventDefault(); updateMouse(e); }, {passive: false});

    function resetGame() { initVars(); loop(); }

    function loop() {
        if (gameOver) return;
        ctx.clearRect(0,0,canvas.width,canvas.height);

        if (shields <= 0) {
            gameOver=true; ctx.fillStyle='#f00'; ctx.font='bold 40px Arial'; ctx.textAlign='center';
            ctx.fillText("הבסיס הושמד!", canvas.width/2, canvas.height/2);
            restartBtn.style.display='block'; return;
        }

        if (isLaserCharged) {
            laserTimer--;
            if (laserTimer <= 0) {
                isLaserCharged = false; laserPower = baseLaserPower; isCooldown = true; laserTimer = COOLDOWN_FRAMES;
            }
        } else if (isCooldown) {
            laserTimer--;
            if (laserTimer <= 0) {
                isCooldown = false;
            }
        }
        updateLaserUI();

        if(Math.random() < 0.018) drones.push(new Drone());

        if(score >= lastBonusScore + 5000 && score > 0) {
            lastBonusScore += 5000; systemMsg.style.display = 'block';
            drones.forEach(d => { d.hp = d.hpMax; }); 
            setTimeout(() => { systemMsg.style.display = 'none'; }, 3500);
        }

        let firing = false;
        for(let i=drones.length-1; i>=0; i--) {
            drones[i].update(); drones[i].draw();
            if(drones[i].hp > 0 && drones[i].hp < drones[i].hpMax) firing = true;

            if(drones[i].hp >= drones[i].hpMax) {
                score += 100; drones.splice(i,1);
                
                if(!isLaserCharged && !isCooldown) {
                    combo++;
                    if(combo >= 10) { 
                        combo = 0; isLaserCharged = true; laserPower = 30; laserTimer = POWER_FRAMES; 
                    }
                }
                document.getElementById('score-val').innerText = score;
            } else if(drones[i].y > canvas.height) {
                drones.splice(i,1); shields--; combo=0; triggerImpactAlert(); 
                document.getElementById('shields-val').innerText = shields;
            }
        }

        if(firing || isLaserCharged) {
            let g = ctx.createLinearGradient(canvas.width/2, canvas.height, mx, my);
            if(isLaserCharged) { g.addColorStop(0, "#ffcc00"); g.addColorStop(1, "#fff"); }
            else { g.addColorStop(0, "#00f"); g.addColorStop(1, "#fff"); }
            ctx.strokeStyle = g; ctx.lineWidth = isLaserCharged ? 14 : 6;
            if(isLaserCharged) { ctx.shadowBlur = 20; ctx.shadowColor = "#ffcc00"; }
            ctx.beginPath(); ctx.moveTo(canvas.width/2, canvas.height); ctx.lineTo(mx, my); ctx.stroke();
            ctx.shadowBlur = 0;
        }
        requestAnimationFrame(loop);
    }
    initVars(); loop();
</script>
</body>
</html>
