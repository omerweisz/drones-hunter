<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>שאגת הארי : הגנה אווירית</title>
    <style>
        body { background-color: #050510; color: #00ffff; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; touch-action: none; }
        #ui-container { padding: 10px; background: rgba(0,0,30,0.9); z-index: 10; border-bottom: 2px solid #00f; user-select: none; }
        #game-wrapper { flex-grow: 1; position: relative; width: 100%; overflow: hidden; display: flex; justify-content: center; }
        canvas { background-color: #0a0f24; display: block; }
        
        /* הקו המפריד למטה */
        #bottom-divider { width: 100%; height: 4px; background: linear-gradient(90deg, transparent, #00ffff, transparent); box-shadow: 0 0 15px #00ffff; z-index: 60; }

        #alert-container { position: absolute; left: 20px; top: 20px; width: 280px; pointer-events: none; z-index: 100; display: flex; flex-direction: column; gap: 10px; }
        .alert-msg { background: rgba(200, 0, 0, 0.9); border-right: 6px solid #ff3333; padding: 15px; color: white; font-weight: bold; font-size: 16px; animation: slideIn 0.3s ease-out, fadeOut 4s forwards; border-radius: 5px; text-align: right; }
        
        #laser-ui { width: 100%; height: 25px; background: #111; position: relative; z-index: 50; }
        #laser-bar { height: 100%; width: 0%; background: #0088ff; transition: width 0.1s linear; box-shadow: 0 0 10px #0088ff; }
        
        #restart-btn { display: none; position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%); padding: 18px 45px; font-size: 26px; background: #fff; color: #000; border: 5px solid #00f; border-radius: 12px; cursor: pointer; font-weight: bold; z-index: 200; box-shadow: 0 0 20px #00f; }
        #combo-display { position: absolute; right: 20px; top: 20px; color: #fff; font-size: 20px; font-weight: bold; text-shadow: 0 0 10px #00f; pointer-events: none; }
    </style>
</head>
<body>

    <div id="ui-container">
        <h1 style="margin:0; font-size: 22px;">שאגת הארי : הגנה אווירית</h1>
        <div style="font-size: 15px;">ניקוד: <span id="score-val">0</span> | הגנות: <span id="shields-val">5</span></div>
    </div>

    <div id="game-wrapper">
        <div id="combo-display">רצף: <span id="kill-streak-val">0</span></div>
        <div id="alert-container"></div>
        <canvas id="gameCanvas"></canvas>
        <button id="restart-btn" onclick="resetGame()">שחק שוב</button>
    </div>
    
    <div id="bottom-divider"></div>
    <div id="laser-ui">
        <div id="laser-bar"></div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const alertContainer = document.getElementById('alert-container');
    const restartBtn = document.getElementById('restart-btn');
    const killStreakUI = document.getElementById('kill-streak-val');

    let score, shields, drones, particles, gameOver, killStreak, bonusTexts = [];
    let baseLaserPower = 6.0;
    let mx = -100, my = -100;
    const cities = ["תל אביב", "חיפה", "אשקלון", "באר שבע", "נהריה", "שדרות", "ירושלים", "אשדוד", "קרית שמונה", "נתיבות"];

    function resize() {
        canvas.width = Math.min(window.innerWidth, 800);
        canvas.height = window.innerHeight - document.getElementById('ui-container').offsetHeight - 25 - 4;
    }
    window.addEventListener('resize', resize); resize();

    class Particle {
        constructor(x, y) {
            this.x = x; this.y = y;
            this.size = Math.random() * 8 + 5;
            this.vx = (Math.random() - 0.5) * 12;
            this.vy = (Math.random() - 0.5) * 12;
            this.color = Math.random() > 0.5 ? "#ffffff" : "#00ffff";
            this.life = 1.0;
        }
        update() { this.x += this.vx; this.y += this.vy; this.life -= 0.03; }
        draw() {
            ctx.save(); ctx.globalAlpha = this.life; ctx.translate(this.x, this.y); ctx.rotate(this.life * 5);
            ctx.strokeStyle = this.color; ctx.lineWidth = 2;
            this.drawStar(0, 0, this.size); ctx.restore();
        }
        drawStar(x, y, s) {
            ctx.beginPath(); for(let i=0; i<3; i++) { let a = (i * 120) * Math.PI/180; ctx.lineTo(Math.cos(a)*s, Math.sin(a)*s); } ctx.closePath(); ctx.stroke();
            ctx.beginPath(); for(let i=0; i<3; i++) { let a = (i * 120 + 60) * Math.PI/180; ctx.lineTo(Math.cos(a)*s, Math.sin(a)*s); } ctx.closePath(); ctx.stroke();
        }
    }

    class Drone {
        constructor() {
            let r = Math.random();
            if (r < 0.3) { this.type='fast'; this.speed=3.4; this.hpMax=35; } 
            else if (r < 0.5) { this.type='tank'; this.speed=1.8; this.hpMax=280; } 
            else { this.type='norm'; this.speed=2.7; this.hpMax=130; } 
            this.x = Math.random()*(canvas.width-80)+40; this.y = -60; this.hp = 0;
        }
        update() {
            this.y += this.speed;
            if (Math.sqrt((this.x-mx)**2 + (this.y-my)**2) < 45) this.hp += baseLaserPower;
        }
        draw() {
            ctx.strokeStyle = "#777"; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(this.x-20, this.y-12); ctx.lineTo(this.x+20, this.y+12); ctx.moveTo(this.x+20, this.y-12); ctx.lineTo(this.x-20, this.y+12); ctx.stroke();
            let w = 34, h = 16, cL, cM, cR;
            if(this.type === 'norm') { cR='#f00'; cM='#007a3d'; cL='#fff'; } 
            else if(this.type === 'fast') { cL='#000'; cM='#f00'; cR='#fff'; } 
            else { cL='#f00'; cM='#000'; cR='#fff'; } 
            ctx.fillStyle = cL; ctx.fillRect(this.x-w/2, this.y-h/2, w/3, h); ctx.fillStyle = cM; ctx.fillRect(this.x-w/2+w/3, this.y-h/2, w/3, h); ctx.fillStyle = cR; ctx.fillRect(this.x-w/2+(w/3)*2, this.y-h/2, w/3, h);
            if(this.hp > 0) { ctx.fillStyle = "cyan"; ctx.fillRect(this.x-17, this.y-25, (this.hp/this.hpMax)*34, 4); }
        }
    }

    function initVars() {
        score=0; shields=5; drones=[]; particles=[]; killStreak=0; bonusTexts=[]; gameOver=false;
        document.getElementById('shields-val').innerText = shields; document.getElementById('score-val').innerText = score;
        killStreakUI.innerText = killStreak; restartBtn.style.display='none';
    }

    function updateMouse(e) {
        let rect = canvas.getBoundingClientRect();
        mx = (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left;
        my = (e.clientY || (e.touches && e.touches[0].clientY)) - rect.top;
    }
    canvas.addEventListener('mousemove', updateMouse); canvas.addEventListener('touchstart', updateMouse); canvas.addEventListener('touchmove', e => { e.preventDefault(); updateMouse(e); }, {passive: false});

    function resetGame() { initVars(); loop(); }

    function loop() {
        if (gameOver) return;
        ctx.clearRect(0,0,canvas.width,canvas.height);

        if (shields <= 0) {
            gameOver=true; ctx.fillStyle='#f00'; ctx.font='bold 40px Arial'; ctx.textAlign='center';
            ctx.fillText("הבסיס הושמד!", canvas.width/2, canvas.height/2); restartBtn.style.display='block'; return;
        }

        if(Math.random() < 0.02 && drones.length < 8) drones.push(new Drone());

        let firing = false;
        for(let i=drones.length-1; i>=0; i--) {
            drones[i].update(); drones[i].draw();
            if(drones[i].hp > 0 && drones[i].hp < drones[i].hpMax) firing = true;

            if(drones[i].hp >= drones[i].hpMax) {
                for(let p=0; p<15; p++) particles.push(new Particle(drones[i].x, drones[i].y));
                score += 100; 
                killStreak++;
                killStreakUI.innerText = killStreak;

                // בונוס הריגת 5: מחסל 2 אחרים באופן מיידי
                if(killStreak % 5 === 0) {
                    let targetsFound = 0;
                    // מחפשים 2 כטב"מים אחרים שעדיין "חיים"
                    for(let j=drones.length-1; j>=0 && targetsFound < 2; j--) {
                        if(i !== j) { 
                            for(let p=0; p<20; p++) particles.push(new Particle(drones[j].x, drones[j].y));
                            drones.splice(j, 1);
                            targetsFound++;
                            score += 50;
                            // אם מחקנו אינדקס קטן מ-i, צריך לעדכן את i
                            if(j < i) i--;
                        }
                    }
                    if(targetsFound > 0) {
                        bonusTexts.push({x: canvas.width/2, y: canvas.height/2, life: 1.0, text: "בונוס: 2-"});
                    }
                }

                drones.splice(i,1);
                document.getElementById('score-val').innerText = score;
            } else if(drones[i].y > canvas.height) {
                drones.splice(i,1); shields--; killStreak=0; killStreakUI.innerText = killStreak;
                document.getElementById('shields-val').innerText = shields;
            }
        }

        for(let i=particles.length-1; i>=0; i--) {
            particles[i].update(); particles[i].draw();
            if(particles[i].life <= 0) particles.splice(i,1);
        }

        // ציור טקסט בונוס
        for(let i=bonusTexts.length-1; i>=0; i--) {
            ctx.save(); ctx.globalAlpha = bonusTexts[i].life; ctx.fillStyle="#00ffff"; ctx.font="bold 30px Arial";
            ctx.textAlign="center"; ctx.fillText(bonusTexts[i].text, bonusTexts[i].x, bonusTexts[i].y);
            ctx.restore(); bonusTexts[i].y -= 1; bonusTexts[i].life -= 0.02;
            if(bonusTexts[i].life <= 0) bonusTexts.splice(i,1);
        }

        if(firing) {
            ctx.strokeStyle = "#00ffff"; ctx.lineWidth = 6; ctx.shadowBlur = 10; ctx.shadowColor = "cyan";
            ctx.beginPath(); ctx.moveTo(canvas.width/2, canvas.height); ctx.lineTo(mx, my); ctx.stroke();
            ctx.shadowBlur = 0;
        }
        requestAnimationFrame(loop);
    }
    initVars(); loop();
</script>
</body>
</html>
