<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8"><title>שאגת הארי</title>
    <style>
        body { background: #050510; color: #0ff; font-family: sans-serif; margin: 0; overflow: hidden; text-align: center; }
        canvas { background: #0a0f24; display: block; margin: auto; }
        #stats { padding: 10px; font-size: 18px; }
        #p-bar { width: 200px; height: 10px; border: 1px solid #fff; margin: 10px auto; display: none; }
    </style>
</head>
<body>
    <div id="stats">חיים: <span id="sh">5</span> | רצף: <span id="cb">0</span>/10 | ניקוד: <span id="sc">0</span></div>
    <div id="p-bar"><div id="p-p" style="height:100%; background: #0f0;"></div></div>
    <canvas id="c"></canvas>

<script>
    const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
    let score=0, shields=5, drones=[], combo=0, sT=0, cT=0, mx=0, my=0;

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight-100; }
    window.onresize = resize; resize();

    class Drone {
        constructor() {
            this.type = Math.random() < 0.3 ? 'tank' : 'norm';
            this.size = this.type === 'tank' ? 30 : 18;
            this.hpMax = this.type === 'tank' ? 200 : 70; // כאן ההבדל ב-HP
            this.hp = 0; this.x = Math.random()*(canvas.width-40)+20; this.y = -20;
            this.speed = this.type === 'tank' ? 0.8 : 1.5;
        }
        update() {
            this.y += this.speed;
            let d = Math.sqrt((this.x-mx)**2 + (this.y-my)**2);
            if (d < 50) this.hp += sT > 0 ? 5 : 2; else this.hp = Math.max(0, this.hp-1);
        }
        draw() {
            ctx.fillStyle = this.type === 'tank' ? '#555' : '#fff';
            ctx.fillRect(this.x-this.size/2, this.y, this.size, 10);
            if(this.hp > 0) { ctx.fillStyle = '#0ff'; ctx.fillRect(this.x-15, this.y-10, (this.hp/this.hpMax)*30, 3); }
        }
    }

    canvas.onmousemove = e => { mx = e.clientX; my = e.clientY - canvas.offsetTop; };

    function loop() {
        if (shields <= 0) return alert("המשחק נגמר! ניקוד: " + score);
        ctx.clearRect(0,0,canvas.width,canvas.height);
        
        if (sT > 0) { sT--; if(sT==0) cT=180; } else if (cT > 0) cT--;

        if (Math.random() < 0.03) drones.push(new Drone());

        drones.forEach((d, i) => {
            d.update(); d.draw();
            if (d.hp >= d.hpMax) {
                score+=100; if(sT==0 && cT==0) combo++;
                if(combo>=10) { sT=180; combo=0; }
                drones.splice(i, 1);
            } else if (d.y > canvas.height) {
                shields--; drones.splice(i, 1); combo=0;
                console.log("נפילה!");
            }
        });

        if (mx > 0) {
            ctx.lineWidth = sT > 0 ? 8 : 3;
            ctx.strokeStyle = sT > 0 ? '#f00' : '#04f';
            ctx.beginPath(); ctx.moveTo(canvas.width/2, canvas.height); ctx.lineTo(mx, my); ctx.stroke();
        }

        const bar = document.getElementById('p-bar');
        if (sT > 0 || cT > 0) {
            bar.style.display = 'block';
            document.getElementById('p-p').style.width = (sT > 0 ? sT/1.8 : 100-cT/1.8) + '%';
            document.getElementById('p-p').style.background = sT > 0 ? '#0f0' : '#f00';
        } else bar.style.display = 'none';

        document.getElementById('sh').innerText = shields;
        document.getElementById('cb').innerText = combo;
        document.getElementById('sc').innerText = score;
        requestAnimationFrame(loop);
    }
    loop();
</script>
</body>
</html>
