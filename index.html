<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>שאגת הארי : הגנה אווירית</title>
    <style>
        body {
            background-color: #050510; color: #00ffff;
            font-family: 'Segoe UI', sans-serif;
            text-align: center; margin: 0; padding: 0;
            overflow: hidden; display: flex; flex-direction: column;
            height: 100vh; touch-action: none;
        }
        #ui-container { padding: 10px; user-select: none; z-index: 5; }
        #game-wrapper { flex-grow: 1; position: relative; width: 100%; display: flex; justify-content: center; }
        canvas { background-color: #0a0f24; display: block; }
        #alert-container { position: absolute; right: 20px; top: 15%; width: 220px; pointer-events: none; z-index: 100; }
        .alert-msg {
            background: rgba(255, 0, 0, 0.9); border-right: 5px solid #fff;
            padding: 12px; color: white; font-weight: bold; margin-bottom: 10px; 
            font-size: 14px; animation: slideIn 0.2s ease-out, fadeOut 3s forwards;
            box-shadow: 0 0 15px rgba(255,0,0,0.6); border-radius: 4px; text-align: right;
        }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        @keyframes fadeOut { 0% { opacity: 1; } 80% { opacity: 1; } 100% { opacity: 0; transform: translateX(20px); } }
        #restart-btn {
            display: none; position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            padding: 15px 30px; font-size: 22px; background: #fff; color: #000;
            border: 3px solid #00f; border-radius: 5px; cursor: pointer; font-weight: bold; z-index: 200;
        }
    </style>
</head>
<body>

    <div id="ui-container">
        <h1 style="margin:0; font-size: 24px; color: #fff; text-shadow: 0 0 15px #00f;">שאגת הארי</h1>
        <div style="font-size: 16px; color: #88ccff; margin-top:5px;">
            ניקוד: <span id="score-val">0</span> | 
            רצף (3 = חיסול כפול): <span id="combo-val">0</span>/3 | 
            הגנות: <span id="shields-val">5</span>
        </div>
    </div>

    <div id="game-wrapper">
        <div id="alert-container"></div>
        <canvas id="gameCanvas"></canvas>
        <button id="restart-btn" onclick="resetGame()">שחק שוב</button>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const restartBtn = document.getElementById('restart-btn');
    const alertContainer = document.getElementById('alert-container');

    let score, shields, drones, particles, gameOver, combo, flash = 0, mx = 0, my = 0;

    function resize() {
        canvas.width = Math.min(window.innerWidth, 800);
        canvas.height = document.getElementById('game-wrapper').clientHeight;
    }
    window.onresize = resize; resize();

    function drawStar(x, y, s, col) {
        ctx.save(); ctx.translate(x, y); ctx.strokeStyle = col; ctx.lineWidth = 2;
        for(let i=0; i<2; i++) {
            ctx.beginPath(); ctx.rotate(Math.PI);
            ctx.moveTo(0, -s); ctx.lineTo(s*0.8, s*0.5); ctx.lineTo(-s*0.8, s*0.5);
            ctx.closePath(); ctx.stroke();
        } ctx.restore();
    }

    class Particle {
        constructor(x, y) {
            this.x = x; this.y = y; this.color = Math.random() > 0.5 ? "#fff" : "#00f";
            this.size = Math.random() * 8 + 4;
            this.sx = (Math.random()-0.5)*15; this.sy = (Math.random()-0.5)*15;
            this.life = 1.0;
        }
        update() { this.x+=this.sx; this.y+=this.sy; this.life-=0.06; }
        draw() { ctx.globalAlpha=this.life; drawStar(this.x,this.y,this.size,this.color); ctx.globalAlpha=1; }
    }

    class Drone {
        constructor() {
            let r = Math.random();
            if (r < 0.2) { this.type='fast'; this.speed=3.8; this.hpMax=10; } // סגול
            else if (r < 0.4) { this.type='tank'; this.speed=1.3; this.hpMax=25; } // צהוב
            else { this.type='norm'; this.speed=2.2; this.hpMax=15; } // אדום
            this.x = Math.random()*(canvas.width-60)+30; this.y = -50; this.hp = 0;
        }
        update() {
            this.y += this.speed;
            let d = Math.sqrt((this.x-mx)**2 + (this.y-my)**2);
            if (d < 55) this.hp += 12; 
        }
        draw() {
            // זרועות הרחפן
            ctx.strokeStyle = "#555"; ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(this.x-22, this.y-14); ctx.lineTo(this.x+22, this.y+14);
            ctx.moveTo(this.x+22, this.y-14); ctx.lineTo(this.x-22, this.y+14);
            ctx.stroke();

            // גוף הרחפן עם הצבעים המיוחדים
            let w = 26, h = 12;
            let c1, c2, c3;

            if(this.type === 'norm') { // אדום: אדום, ירוק, לבן (מימין לשמאל)
                c3='#ff0000'; c2='#007a3d'; c1='#fff'; 
            } else if(this.type === 'fast') { // סגול: אדום, ירוק, לבן (משמאל לימין)
                c1='#ff0000'; c2='#007a3d'; c3='#fff';
            } else { // צהוב: אדום, שחור, לבן
                c1='#ff0000'; c2='#000'; c3='#fff';
            }

            // ציור שלושת חלקי הגוף
            ctx.fillStyle = c1; ctx.fillRect(this.x - w/2, this.y - h/2, w/3, h);
            ctx.fillStyle = c2; ctx.fillRect(this.x - w/2 + w/3, this.y - h/2, w/3, h);
            ctx.fillStyle = c3; ctx.fillRect(this.x - w/2 + (w/3)*2, this.y - h/2, w/3, h);

            // מנועים לבנים בקצוות
            ctx.fillStyle = "#fff";
            [[-22,-14], [22,-14], [-22,14], [22,14]].forEach(p => {
                ctx.beginPath(); ctx.arc(this.x+p[0], this.y+p[1], 4, 0, Math.PI*2); ctx.fill();
            });
        }
        explode() {
            for(let j=0; j<12; j++) particles.push(new Particle(this.x, this.y));
            score += 100;
        }
    }

    function triggerAlert() {
        const div = document.createElement('div'); div.className = 'alert-msg';
        div.innerHTML = `נפילה באזור מגורים!<br>⚠️ נזק כבד`;
        alertContainer.prepend(div); setTimeout(() => div.remove(), 2000);
    }

    function initVars() {
        score=0; shields=5; drones=[]; particles=[]; combo=0; gameOver=false;
        document.getElementById('shields-val').innerText = shields;
        document.getElementById('combo-val').innerText = combo;
        document.getElementById('score-val').innerText = score;
        restartBtn.style.display='none';
    }

    canvas.onmousemove = e => { let r=canvas.getBoundingClientRect(); mx=e.clientX-r.left; my=e.clientY-r.top; };
    canvas.ontouchmove = e => { e.preventDefault(); let r=canvas.getBoundingClientRect(); mx=e.touches[0].clientX-r.left; my=e.touches[0].clientY-r.top; };

    function resetGame() { initVars(); loop(); }

    function loop() {
        if (gameOver) return;
        ctx.clearRect(0,0,canvas.width,canvas.height);

        if (shields <= 0) {
            gameOver=true; ctx.fillStyle='red'; ctx.font='bold 40px Arial'; ctx.textAlign='center';
            ctx.fillText("ההגנה נפרצה!", canvas.width/2, canvas.height/2);
            restartBtn.style.display='block'; return;
        }

        if(Math.random() < 0.055) drones.push(new Drone());

        let firing = false;
        for(let i=drones.length-1; i>=0; i--) {
            drones[i].update(); drones[i].draw();
            if(drones[i].hp > 0) firing = true;

            if(drones[i].hp >= drones[i].hpMax) {
                drones[i].explode();
                drones.splice(i,1);
                combo++;
                flash = 0.2;
                
                if(combo >= 3) {
                    combo = 0;
                    flash = 0.4;
                    // חיסול כפול - משמיד את ה-2 הכי נמוכים
                    for(let k=0; k<2; k++) {
                        if(drones.length > 0) {
                            let lowIdx = 0;
                            drones.forEach((d, idx) => { if(d.y > drones[lowIdx].y) lowIdx = idx; });
                            drones[lowIdx].explode();
                            drones.splice(lowIdx, 1);
                        }
                    }
                }
                document.getElementById('combo-val').innerText = combo;
                document.getElementById('score-val').innerText = score;
            } else if(drones[i].y > canvas.height) {
                drones.splice(i,1); shields--; triggerAlert(); combo=0;
                document.getElementById('shields-val').innerText = shields;
                document.getElementById('combo-val').innerText = combo;
            }
        }

        for(let i=particles.length-1; i>=0; i--) {
            particles[i].update(); particles[i].draw();
            if(particles[i].life<=0) particles.splice(i,1);
        }

        if(firing) {
            let g = ctx.createLinearGradient(canvas.width/2, canvas.height, mx, my);
            g.addColorStop(0, "#00f"); g.addColorStop(1, "#fff"); ctx.strokeStyle = g;
            ctx.lineWidth = 5; ctx.beginPath(); ctx.moveTo(canvas.width/2, canvas.height); ctx.lineTo(mx, my); ctx.stroke();
            drawStar(mx, my, 20, "#fff");
        }

        if(flash > 0) { ctx.fillStyle=`rgba(255,255,255,${flash})`; ctx.fillRect(0,0,canvas.width,canvas.height); flash-=0.05; }
        requestAnimationFrame(loop);
    }

    initVars(); loop();
</script>
</body>
</html>
